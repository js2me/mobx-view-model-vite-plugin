name: CI

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set-up Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version-file: .nvmrc

      - run: corepack enable

      - name: Install deps
        run: pnpm i

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test
